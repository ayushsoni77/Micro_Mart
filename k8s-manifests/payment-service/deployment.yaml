apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-service-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ayushsoni7777/micro_mart:payment-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
              name: http
          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 35
            periodSeconds: 15
